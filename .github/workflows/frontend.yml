name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths: ['emp-frontend-webapp/**']
  pull_request:
    branches: [main]
    paths: ['emp-frontend-webapp/**']

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: emp-frontend-webapp/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: emp-frontend-webapp
      - name: Lint
        run: npm run lint
        working-directory: emp-frontend-webapp
      - name: Build
        run: npm run build
        working-directory: emp-frontend-webapp
      - name: Test
        run: npm test -- --passWithNoTests
        working-directory: emp-frontend-webapp

  docker:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.ecr.outputs.registry }}/emp-frontend:${{ github.sha }} .
          docker build -t ${{ steps.ecr.outputs.registry }}/emp-frontend:latest .
          docker push ${{ steps.ecr.outputs.registry }}/emp-frontend:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/emp-frontend:latest
        working-directory: emp-frontend-webapp
