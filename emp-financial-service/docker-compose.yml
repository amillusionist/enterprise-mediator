version: '3.8'

services:
  financial-api:
    image: ${DOCKER_REGISTRY-}enterprisemediatorfinancialwebapi
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
      - "5003:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=FinancialDb;Username=postgres;Password=[REDACTED]
      - RabbitMq__Host=rabbitmq
      - Stripe__ApiKey=sk_test_placeholder
      - Wise__ApiToken=placeholder
    depends_on:
      - postgres
      - rabbitmq

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=FinancialDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=[REDACTED]
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

volumes:
  postgres_data: